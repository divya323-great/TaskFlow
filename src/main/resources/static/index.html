<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Team Task Manager</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --secondary: #10b981;
      --danger: #ef4444;
      --warn: #f59e0b;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: #334155;
      --radius: 12px;
    }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-wrapper {
      width: 100%;
      max-width: 440px;
      padding: 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-logo {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }
    .brand h1 { font-size: 28px; font-weight: 700; }
    .brand p { color: var(--muted); margin-top: 4px; font-size: 14px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .tabs {
      display: flex;
      background: var(--surface2);
      border-radius: 8px;
      padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 9px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      transition: all 0.2s;
      border: none;
      background: none;
    }
    .tab.active {
      background: var(--primary);
      color: #fff;
    }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--muted); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: var(--primary); }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-error { background: #7f1d1d33; border: 1px solid #ef44444d; color: #fca5a5; }
    .alert-success { background: #064e3b33; border: 1px solid #10b9814d; color: #6ee7b7; }
    .form-section { display: none; }
    .form-section.active { display: block; }
  </style>
</head>
<body>
  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-logo">✦</div>
      <h1>TaskFlow</h1>
      <p>Team Task Management System</p>
    </div>
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('signup')">Sign Up</button>
      </div>
      <div id="alert-box" style="display:none"></div>

      <!-- Login Form -->
      <div id="login-form" class="form-section active">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="btn btn-primary" onclick="login()">Sign In</button>
      </div>

      <!-- Signup Form -->
      <div id="signup-form" class="form-section">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="signup-email" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Min 6 characters" />
        </div>
        <button class="btn btn-primary" onclick="signup()">Create Account</button>
      </div>
    </div>
  </div>

  <script>
    const API = '';

    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById(tab + '-form').classList.add('active');
      hideAlert();
    }

    function showAlert(msg, type = 'error') {
      const box = document.getElementById('alert-box');
      box.style.display = 'block';
      box.className = 'alert alert-' + type;
      box.textContent = msg;
    }
    function hideAlert() {
      document.getElementById('alert-box').style.display = 'none';
    }

    async function login() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('Please fill in all fields');
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) return showAlert(data.error || 'Login failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, role: data.role }));
        window.location.href = '/dashboard.html';
      } catch (e) { showAlert('Connection error. Is the server running?'); }
    }

    async function signup() {
      const name = document.getElementById('signup-name').value.trim();
      const email = document.getElementById('signup-email').value.trim();
      const password = document.getElementById('signup-password').value;
      if (!name || !email || !password) return showAlert('Please fill in all fields');
      if (password.length < 6) return showAlert('Password must be at least 6 characters');
      try {
        const res = await fetch(API + '/api/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();
        if (!res.ok) return showAlert(data.error || Object.values(data)[0] || 'Signup failed');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify({ name: data.name, email: data.email, role: data.role }));
        showAlert('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = '/dashboard.html', 800);
      } catch (e) { showAlert('Connection error. Is the server running?'); }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const active = document.querySelector('.form-section.active').id;
        if (active === 'login-form') login();
        else signup();
      }
    });
  </script>
</body>
</html>
